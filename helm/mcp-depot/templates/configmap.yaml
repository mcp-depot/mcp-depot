apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "mcp-depot.fullname" . }}-config
  labels:
    {{- include "mcp-depot.labels" . | nindent 4 }}
data:
  PORT: {{ .Values.env.PORT | quote }}
  NODE_ENV: {{ .Values.env.NODE_ENV }}
  JWT_EXPIRE: {{ .Values.env.JWT_EXPIRE }}
  JWT_REFRESH_EXPIRE: {{ .Values.env.JWT_REFRESH_EXPIRE }}
  ALLOW_REGISTRATION: {{ .Values.env.ALLOW_REGISTRATION }}
  API_BASE_URL: {{ .Values.env.API_BASE_URL }}
  {{- if .Values.ingress.enabled }}
  API_BASE_URL: {{ printf "https://%s" .Values.ingress.host }}
  {{- end }}
  MCP_PACKAGES_PATH: "/opt/mcp-packages"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "mcp-depot.fullname" . }}-nginx-config
  labels:
    {{- include "mcp-depot.labels" . | nindent 4 }}
data:
  nginx.conf: |
    worker_processes auto;
    events {
      worker_connections 1024;
    }
    http {
      include /etc/nginx/mime.types;
      default_type application/octet-stream;
      sendfile on;
      keepalive_timeout 65;
      server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;
        location / {
          try_files $uri $uri/ /index.html;
        }
        location /api/ {
          proxy_pass http://{{ include "mcp-depot.fullname" . }}-server:3000/;
          proxy_http_version 1.1;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection 'upgrade';
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_cache_bypass $http_upgrade;
        }
      }
    }