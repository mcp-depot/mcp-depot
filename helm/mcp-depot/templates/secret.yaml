{{- $existing := lookup "v1" "Secret" .Release.Namespace (printf "%s-secrets" (include "mcp-depot.fullname" .)) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "mcp-depot.fullname" . }}-secrets
  labels:
    {{- include "mcp-depot.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.secrets.existingSecret }}
  # When using existingSecret, these values are ignored
  {{- else }}
  JWT_SECRET: {{ .Values.secrets.jwtSecret | default (($existing.data).JWT_SECRET | b64dec) | default (randAlphaNum 32) | quote }}
  JWT_REFRESH_SECRET: {{ .Values.secrets.sessionSecret | default (($existing.data).JWT_REFRESH_SECRET | b64dec) | default (randAlphaNum 32) | quote }}
  ENCRYPTION_KEY: {{ .Values.secrets.encryptionKey | default (($existing.data).ENCRYPTION_KEY | b64dec) | default (randAlphaNum 32) | quote }}
  {{- end }}
  {{- if .Values.postgres.enabled }}
  POSTGRES_PASSWORD: {{ (($existing.data).POSTGRES_PASSWORD | b64dec) | default (randAlphaNum 16) | quote }}
  {{- end }}