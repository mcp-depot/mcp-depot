{{- if not .Values.secrets.existingSecret }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace (printf "%s-secrets" (include "mcp-depot.fullname" .)) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "mcp-depot.fullname" . }}-secrets
  labels:
    {{- include "mcp-depot.labels" . | nindent 4 }}
type: Opaque
stringData:
  JWT_SECRET: {{ .Values.secrets.jwtSecret | default ((($existing.data).JWT_SECRET | default "") | b64dec) | default (randAlphaNum 32) | quote }}
  JWT_REFRESH_SECRET: {{ .Values.secrets.sessionSecret | default ((($existing.data).JWT_REFRESH_SECRET | default "") | b64dec) | default (randAlphaNum 32) | quote }}
  ENCRYPTION_KEY: {{ .Values.secrets.encryptionKey | default ((($existing.data).ENCRYPTION_KEY | default "") | b64dec) | default (randAlphaNum 32) | quote }}
  {{- if .Values.postgres.enabled }}
  POSTGRES_PASSWORD: {{ ((($existing.data).POSTGRES_PASSWORD | default "") | b64dec) | default (randAlphaNum 16) | quote }}
  {{- end }}
{{- end }}