apiVersion: v1
kind: Secret
metadata:
  name: {{ include "mcp-depot.fullname" . }}-secrets
  labels:
    {{- include "mcp-depot.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.secrets.existingSecret }}
  # When using existingSecret, these values are ignored
  {{- else }}
  JWT_SECRET: {{ .Values.secrets.jwtSecret | default (randAlphaNum 32) | quote }}
  JWT_REFRESH_SECRET: {{ .Values.secrets.sessionSecret | default (randAlphaNum 32) | quote }}
  ENCRYPTION_KEY: {{ .Values.secrets.encryptionKey | default (randAlphaNum 32) | quote }}
  {{- end }}
  {{- if .Values.postgres.enabled }}
  POSTGRES_PASSWORD: {{ randAlphaNum 16 | quote }}
  {{- end }}