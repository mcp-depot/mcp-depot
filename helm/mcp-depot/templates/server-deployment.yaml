apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mcp-depot.fullname" . }}-server
  labels:
    {{- include "mcp-depot.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "mcp-depot.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: server
  template:
    metadata:
      labels:
        {{- include "mcp-depot.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: server
    spec:
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      {{- end }}
      containers:
        - name: server
          image: "{{ .Values.image.server.repository }}:{{ .Values.image.server.tag }}"
          imagePullPolicy: {{ .Values.image.server.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "mcp-depot.fullname" . }}-config
            - secretRef:
                name: {{ .Values.secrets.existingSecret | default (printf "%s-secrets" (include "mcp-depot.fullname" .)) }}
            {{- if .Values.extraEnvFrom }}
            {{- toYaml .Values.extraEnvFrom | nindent 12 }}
            {{- end }}
          env:
            {{- if .Values.postgres.enabled }}
            - name: DATABASE_URL
              value: "postgres://postgres:$(POSTGRES_PASSWORD)@{{ include "mcp-depot.fullname" . }}-postgres:5432/mcpconnect"
            {{- else }}
            - name: DATABASE_URL
              value: {{ .Values.externalDatabase.url | quote }}
            {{- end }}
            {{- if .Values.extraEnv }}
            {{- toYaml .Values.extraEnv | nindent 12 }}
            {{- end }}
          {{- if .Values.livenessProbe.enabled }}
          livenessProbe:
            httpGet:
              path: {{ .Values.livenessProbe.path }}
              port: http
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
          {{- end }}
          {{- if .Values.readinessProbe.enabled }}
          readinessProbe:
            httpGet:
              path: {{ .Values.readinessProbe.path }}
              port: http
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources.server | nindent 12 }}
          volumeMounts:
            - name: mcp-packages
              mountPath: /opt/mcp-packages
      volumes:
        - name: mcp-packages
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "mcp-depot.fullname" . }}-server
  labels:
    {{- include "mcp-depot.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: 3000
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "mcp-depot.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: server