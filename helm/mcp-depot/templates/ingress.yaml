{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "mcp-depot.fullname" . }}-ingress
  labels:
    {{- include "mcp-depot.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ .Values.ingress.tls.secretName | default (printf "%s-tls" (include "mcp-depot.fullname" .)) }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /api/
            pathType: Prefix
            backend:
              service:
                name: {{ include "mcp-depot.fullname" . }}-server
                port:
                  number: 3000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "mcp-depot.fullname" . }}-client
                port:
                  number: 80
{{- end }}