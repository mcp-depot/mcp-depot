version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: mcpconnect-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin123}
      POSTGRES_DB: ${POSTGRES_DB:-mcpconnect}
      PGTZ: UTC
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    networks:
      - mcpconnect-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d mcpconnect"]
      interval: 10s
      timeout: 5s
      retries: 5

  valkey:
    image: valkey/valkey:8
    container_name: mcpconnect-valkey
    restart: unless-stopped
    expose:
      - "6379"
    networks:
      - mcpconnect-network
    profiles:
      - secret-store

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: mcpconnect-server
    restart: unless-stopped
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "mcpconnect.local:host-gateway"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=postgres://admin:admin123@postgres:5432/mcpconnect
      - JWT_SECRET=${JWT_SECRET:-change-this-secret-key}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-change-this-refresh-secret}
      - JWT_EXPIRE=15m
      - JWT_REFRESH_EXPIRE=7d
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - ALLOW_SELF_SIGNED_CERTS=${ALLOW_SELF_SIGNED_CERTS:-true}
      - TOOLS_CACHE_ENABLED=${TOOLS_CACHE_ENABLED:-false}
      - TOOLS_CACHE_TTL=${TOOLS_CACHE_TTL:-300000}
      - MCP_ENABLED=${MCP_ENABLED:-true}
      - SECRET_STORE_ENABLED=${SECRET_STORE_ENABLED:-false}
      - SECRET_STORE_SITE_URL=${SECRET_STORE_SITE_URL:-https://app.infisical.com}
      - SECRET_STORE_CLIENT_ID=${SECRET_STORE_CLIENT_ID}
      - SECRET_STORE_CLIENT_SECRET=${SECRET_STORE_CLIENT_SECRET}
      - SECRET_STORE_WORKSPACE_ID=${SECRET_STORE_WORKSPACE_ID}
      - SECRET_STORE_ENVIRONMENT=${SECRET_STORE_ENVIRONMENT:-dev}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@mcpconnect.io}
      - ALLOW_REGISTRATION=${ALLOW_REGISTRATION:-false}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mcpconnect-network

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: mcpconnect-client
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://server:3000
    depends_on:
      - server
    networks:
      - mcpconnect-network

  demo-mcp:
    image: node:20-alpine
    container_name: mcpconnect-demo-mcp
    restart: unless-stopped
    working_dir: /app
    command: ["node", "demo-mcp-server.js"]
    ports:
      - "3001:3001"
    volumes:
      - ./demo-mcp:/app
    networks:
      - mcpconnect-network

  infisical:
    image: infisical/infisical:latest-postgres
    container_name: mcpconnect-infisical
    restart: unless-stopped
    ports:
      - "8181:8080"
    environment:
      - ENCRYPTION_KEY=${INFISICAL_ENCRYPTION_KEY}
      - AUTH_SECRET=${INFISICAL_AUTH_SECRET}
      - DB_CONNECTION_URI=postgres://admin:admin123@postgres:5432/infisical
      - REDIS_URL=redis://valkey:6379
      - SITE_URL=http://localhost:8181
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_started
    networks:
      - mcpconnect-network
    profiles:
      - secret-store

volumes:
  postgres_data:
    name: mcpconnect_postgres_data

networks:
  mcpconnect-network:
    driver: bridge
