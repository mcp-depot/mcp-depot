name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: mcp_depot_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            server/package-lock.json
            client/package-lock.json

      - name: Install server dependencies
        run: cd server && npx --yes npm@11 ci
          
      - name: Run server tests
        run: |
          cd server
          npm test
        env:
          DATABASE_URL: postgres://postgres:test@localhost:5432/mcp_depot_test
          JWT_SECRET: test-secret
          ENCRYPTION_KEY: test-32-byte-encryption-key!!!!
          NODE_ENV: test
          
      - name: Install client dependencies
        run: cd client && npx --yes npm@11 ci
          
      - name: Build client
        run: |
          cd client
          npm run build

  docker:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Docker images
        run: docker compose build
        
      - name: Verify containers start
        run: |
          ENCRYPTION_KEY=ci-test-32-byte-encryption-key!! \
          JWT_SECRET=ci-test-secret \
          docker compose up -d
          sleep 20
          docker compose ps
          docker compose logs server
          curl --fail --retry 10 --retry-delay 3 --retry-all-errors http://localhost:3000/health