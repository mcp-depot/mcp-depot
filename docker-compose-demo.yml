version: '3.8'

# Demo deployment - SQLite, hourly data reset, open registration
#
# Usage:
#   docker compose -f docker-compose-demo.yml up -d
#
# Demo credentials (recreated on every reset):
#   Email:    demo@mcpdepot.dev
#   Password: Demo1234!
#
# Ports (chosen to not clash with a co-located production instance):
#   Server:   3010 -> 3000
#   Client:   3011 -> 5173
#   Demo MCP: 3012 -> 3001
#
# Reverse-proxy example (nginx / Caddy):
#   demo.mcpdepot.dev -> localhost:3011  (React UI)
#   demo.mcpdepot.dev/api -> localhost:3010  (API, for same-origin XHR)

services:

  # ── Main API server (SQLite, no Postgres required) ──────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: mcp-depot-demo-server
    restart: always
    ports:
      - "3010:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - NODE_ENV=production
      - PORT=3000
      # SQLite — no DATABASE_URL means the server picks up SQLITE_PATH
      - SQLITE_PATH=/data/demo.db
      # Secrets — change these before exposing publicly
      - JWT_SECRET=${DEMO_JWT_SECRET:-demo-jwt-secret-replace-before-deploy}
      - JWT_REFRESH_SECRET=${DEMO_JWT_REFRESH_SECRET:-demo-refresh-secret-replace-before-deploy}
      - JWT_EXPIRE=4h
      - JWT_REFRESH_EXPIRE=24h
      - ENCRYPTION_KEY=${DEMO_ENCRYPTION_KEY:-demo-enc-key-must-be-32-chars-ok!}
      # Fixed admin credentials so visitors always know the login after a reset
      - ADMIN_EMAIL=demo@mcpdepot.dev
      - ADMIN_PASSWORD=Demo1234!
      # Allow new visitor accounts
      - ALLOW_REGISTRATION=true
      - DEMO_MODE=true
      - API_BASE_URL=${DEMO_API_URL:-http://localhost:3010}
      - ALLOWED_ORIGINS=${DEMO_ALLOWED_ORIGINS:-http://localhost:3011,https://demo.mcpdepot.dev}
      - MCP_PACKAGES_PATH=/opt/mcp-packages
      - ALLOW_SELF_SIGNED_CERTS=true
      - TOOLS_CACHE_ENABLED=true
      - TOOLS_CACHE_TTL=60000
      - MCP_ENABLED=true
      - SECRET_STORE_ENABLED=false
    volumes:
      - demo_data:/data
      - demo_packages:/opt/mcp-packages
    networks:
      - mcp-demo-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health | grep -q 'ok'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── React admin UI ───────────────────────────────────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: mcp-depot-demo-client
    restart: always
    ports:
      - "3011:5173"
    environment:
      - VITE_API_URL=http://server:3000
    depends_on:
      server:
        condition: service_healthy
    networks:
      - mcp-demo-network

  # ── Example MCP server (pre-wired demo integration) ─────────────────────────
  demo-mcp:
    image: node:20-alpine
    container_name: mcp-depot-demo-mcp
    restart: always
    working_dir: /app
    command: ["node", "demo-mcp-server.js"]
    expose:
      - "3001"
    volumes:
      - ./examples/demo-mcp:/app:ro
    networks:
      - mcp-demo-network

  # ── Hourly reset service ─────────────────────────────────────────────────────
  # Deletes the SQLite file then restarts the server container.
  # The server recreates all tables and re-seeds default tools on startup,
  # so no separate seed SQL is needed.
  demo-reset:
    image: alpine:3.20
    container_name: mcp-depot-demo-reset
    restart: always
    environment:
      - RESET_INTERVAL_SECONDS=${DEMO_RESET_INTERVAL:-3600}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - demo_data:/data
    command: >
      sh -c "
        apk add --no-cache docker-cli --quiet &&
        echo '[demo-reset] Service started. Reset interval: '$$RESET_INTERVAL_SECONDS's.' &&
        while true; do
          sleep $$RESET_INTERVAL_SECONDS;
          echo \"[demo-reset] $(date -u '+%Y-%m-%dT%H:%M:%SZ') — resetting demo data...\";
          rm -f /data/demo.db;
          docker restart mcp-depot-demo-server;
          echo \"[demo-reset] $(date -u '+%Y-%m-%dT%H:%M:%SZ') — done. Server is restarting.\";
        done
      "
    depends_on:
      - server
    networks:
      - mcp-demo-network

volumes:
  demo_data:
    name: mcp-depot_demo_data
  demo_packages:
    name: mcp-depot_demo_packages

networks:
  mcp-demo-network:
    driver: bridge
